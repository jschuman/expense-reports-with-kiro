[pytest]
filterwarnings =
    ignore::PendingDeprecationWarning:multipart
    ignore::PendingDeprecationWarning:starlette
    # asyncio.iscoroutinefunction is deprecated in Python 3.14; these come from
    # fastapi and starlette internals and cannot be fixed in application code.
    ignore::DeprecationWarning:fastapi
    ignore::DeprecationWarning:starlette
