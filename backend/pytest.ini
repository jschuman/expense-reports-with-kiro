[pytest]
asyncio_mode = auto
addopts = --cov=app --cov-report=term-missing --cov-fail-under=100
filterwarnings =
    ignore::PendingDeprecationWarning:multipart
    ignore::PendingDeprecationWarning:starlette
    # asyncio.iscoroutinefunction / get_event_loop_policy / set_event_loop_policy are
    # deprecated in Python 3.14 and called internally by pytest-asyncio 0.23.x.
    # These cannot be fixed in application code — suppress until pytest-asyncio is updated.
    ignore::DeprecationWarning:fastapi
    ignore::DeprecationWarning:starlette
    ignore::DeprecationWarning:pytest_asyncio
