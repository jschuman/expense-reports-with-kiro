openapi: "3.0.3"
info:
  title: Expense Report API
  description: >
    API-first contract for the Expense Report Web App.
    All endpoints are defined here before implementation.
    FastAPI auto-generates /docs and /openapi.json from Pydantic schemas;
    keep this file in sync with those schemas.
  version: "0.2.0"

servers:
  - url: http://localhost:8000
    description: Local development server

tags:
  - name: auth
    description: Authentication — login, logout, session management
  - name: reports
    description: Expense reports — list and create
  - name: clients
    description: Client list — returns the predefined list of available clients

paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Authenticate a user and establish a session
      description: >
        Validates the supplied credentials. On success, sets an HTTP-only
        session cookie and returns the authenticated user's profile.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              username: alice
              password: secret123
      responses:
        "200":
          description: Login successful — session cookie set
          headers:
            Set-Cookie:
              description: HTTP-only session cookie
              schema:
                type: string
                example: "session=<signed_token>; HttpOnly; SameSite=Lax; Path=/"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
              example:
                id: 1
                username: alice
                role: User
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
              example:
                detail: "Invalid username or password"
        "422":
          description: Validation error — missing or malformed fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /auth/logout:
    post:
      tags: [auth]
      summary: Clear the current session
      description: Invalidates the session cookie, effectively logging the user out.
      operationId: logout
      responses:
        "200":
          description: Session cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageDetail"
              example:
                detail: "Logged out"

  /auth/me:
    get:
      tags: [auth]
      summary: Return the currently authenticated user
      description: >
        Used by the frontend to restore session state on page load.
        Returns 401 if no valid session cookie is present.
      operationId: getMe
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
              example:
                id: 1
                username: alice
                role: User
        "401":
          description: No valid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
              example:
                detail: "Not authenticated"

  /reports:
    get:
      tags: [reports]
      summary: List expense reports based on the authenticated user's role
      description: >
        Returns expense reports filtered by the authenticated user's role.
        Admin role users receive all expense reports in the system, each
        including the owner_username field to identify the submitter.
        User role users receive only the reports they own (owner_id matches
        their user id). Requires a valid session cookie.
      operationId: listReports
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Array of expense reports belonging to the authenticated user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpenseReportResponse"
              example:
                - id: 1
                  title: "Q1 Travel"
                  description: "Client visit to NYC"
                  total_amount: 450.00
                  status: "Pending"
                  owner_id: 1
                  owner_username: "alice"
                  created_at: "2026-04-01T09:00:00Z"
                  reimbursable_from_client: false
                  client: null
                  admin_notes: null
        "401":
          description: No valid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
              example:
                detail: "Not authenticated"

    post:
      tags: [reports]
      summary: Create a new expense report
      description: >
        Creates a new expense report for the authenticated user.
        The report is saved with status "Pending". Requires a valid session cookie.
        When reimbursable_from_client is true, client must be provided and must be
        a value from the predefined client list (GET /clients).
      operationId: createReport
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseReportCreate"
            example:
              title: "Q2 Travel"
              description: "Client visit to NYC"
              total_amount: 850.00
              reimbursable_from_client: true
              client: "Acme Corp"
      responses:
        "201":
          description: Report created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseReportResponse"
              example:
                id: 7
                title: "Q2 Travel"
                description: "Client visit to NYC"
                total_amount: 850.00
                status: "Pending"
                owner_id: 1
                owner_username: "alice"
                created_at: "2026-05-01T14:32:00Z"
                reimbursable_from_client: true
                client: "Acme Corp"
                admin_notes: null
        "401":
          description: No valid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
              example:
                detail: "Not authenticated"
        "422":
          description: >
            Validation error — missing fields, non-positive amount,
            reimbursable_from_client=true with no client, or client not in the
            predefined list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
              example:
                detail:
                  - loc: ["body", "client"]
                    msg: "client is required when reimbursable_from_client is true"
                    type: "value_error"

  /clients:
    get:
      tags: [clients]
      summary: Return the predefined list of available clients
      description: >
        Returns the system-managed list of client names that can be selected
        when creating a reimbursable expense report. Requires a valid session cookie.
      operationId: listClients
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Array of client name strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example:
                - "Acme Corp"
                - "Globex Industries"
                - "Initech"
                - "Umbrella Ltd"
                - "Hooli"
        "401":
          description: No valid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
              example:
                detail: "Not authenticated"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          description: The user's login name
        password:
          type: string
          minLength: 1
          description: The user's plaintext password (transmitted over HTTPS only)

    UserResponse:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: integer
          description: Unique user identifier
        username:
          type: string
          description: The user's login name
        role:
          type: string
          enum: [User, Admin]
          description: >
            The name of the role assigned to this user.
            "User" has access only to their own expense reports.
            "Admin" has access to all expense reports in the system.

    ExpenseReportCreate:
      type: object
      required: [title, total_amount]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: Short descriptive title for the expense report
        description:
          type: string
          nullable: true
          description: >
            Optional free-text description of the expense report.
            Replaces the former "purpose" field. May be absent or empty.
        total_amount:
          type: number
          format: float
          exclusiveMinimum: 0
          description: Total monetary amount (must be positive)
        reimbursable_from_client:
          type: boolean
          default: false
          description: >
            Whether this expense is to be reimbursed by a client.
            When true, client must also be provided.
        client:
          type: string
          nullable: true
          description: >
            The client to be billed. Must be a value from GET /clients.
            Required when reimbursable_from_client is true.
            Must be absent or null when reimbursable_from_client is false.

    ExpenseReportResponse:
      type: object
      required:
        - id
        - title
        - total_amount
        - status
        - owner_id
        - owner_username
        - created_at
        - reimbursable_from_client
      properties:
        id:
          type: integer
          description: Unique report identifier
        title:
          type: string
          description: Short descriptive title for the expense report
        description:
          type: string
          nullable: true
          description: Optional free-text description; null when not provided
        total_amount:
          type: number
          format: float
          description: Total monetary amount
        status:
          type: string
          enum: [Pending]
          description: Current status of the report (always "Pending" on creation)
        owner_id:
          type: integer
          description: ID of the user who owns this report
        owner_username:
          type: string
          description: Username of the user who owns this report
        created_at:
          type: string
          format: date-time
          description: UTC timestamp of when the report was created (ISO 8601)
        reimbursable_from_client:
          type: boolean
          description: Whether this expense is to be reimbursed by a client
        client:
          type: string
          nullable: true
          description: The client associated with this report; null when not reimbursable
        admin_notes:
          type: string
          nullable: true
          description: >
            Optional administrative annotations. Not user-settable at creation;
            always null on creation. Reserved for future admin tooling.

    ErrorDetail:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          description: Human-readable error message

    MessageDetail:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          description: Human-readable status message

    ValidationError:
      type: object
      required: [detail]
      properties:
        detail:
          type: array
          items:
            type: object
            required: [loc, msg, type]
            properties:
              loc:
                type: array
                items:
                  type: string
                description: Location of the validation failure (e.g. ["body", "title"])
              msg:
                type: string
                description: Human-readable validation message
              type:
                type: string
                description: Machine-readable error type code
